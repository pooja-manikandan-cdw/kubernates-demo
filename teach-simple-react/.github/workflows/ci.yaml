name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Job 1: PR — test + build only  ───────────────────────────────
  test-and-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test -- --watchAll=false
        env:
          CI: true

      - name: Build Docker image (validation only)
        run: docker build -t teach-simple-react:pr-${{ github.event.pull_request.number }} .

  # ─── Job 2: Merge to main — test + build + push ────────────────────────────
  test-build-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test -- --watchAll=false
        env:
          CI: true

      - name: Set image version tag
        id: version
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/teach-simple-react:${{ steps.version.outputs.tag }} .

      - name: Push Docker image with version tag
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/teach-simple-react:${{ steps.version.outputs.tag }}

      - name: Print pushed image version
        run: |
          echo "==========================================="
          echo "Docker image successfully pushed:"
          echo "  ${{ secrets.DOCKER_USERNAME }}/teach-simple-react:${{ steps.version.outputs.tag }}"
          echo "==========================================="

      - name: Checkout deploy repository
        uses: actions/checkout@v4
        with:
          repository: pooja-manikandan-cdw/kubernates-deployment
          token: ${{ secrets.GH_PAT }}
          path: deploy-repo

      - name: Update image tag in deployment.yaml
        run: |
          sed -i "s|\(image: .*/teach-simple-react:\).*|\1${{ steps.version.outputs.tag }}|" deploy-repo/deployment.yaml

      - name: Raise PR to deploy repository
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          cd deploy-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="update-image-${{ steps.version.outputs.tag }}"
          git checkout -b $BRANCH
          git add deployment.yaml
          git commit -m "chore: update image tag to ${{ steps.version.outputs.tag }}"
          git push origin $BRANCH
          gh pr create \
            --repo pooja-manikandan-cdw/kubernates-deployment \
            --base main \
            --head $BRANCH \
            --title "chore: update image tag to ${{ steps.version.outputs.tag }}" \
            --body "Automated PR: update container image to \`${{ secrets.DOCKER_USERNAME }}/teach-simple-react:${{ steps.version.outputs.tag }}\`"

 